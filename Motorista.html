<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rota Brasil - Passageiro 🇧🇷</title>
    
    <!-- 🎨 ICONES E FONTES -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 🔌 SOCKET E GOOGLE MAPS -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <!-- ⚠️ COLOQUE SUA CHAVE DO GOOGLE MAPS NO LUGAR DE SUA_CHAVE_API_AQUI -->
    <script src="https://maps.googleapis.com/maps/api/js?key=SUA_CHAVE_API_AQUI&libraries=places"></script>

    <style>
        /* 🎨 PALETA DE CORES NOVA - MAIS BONITA E MODERNA 🇧🇷🩷 */
        :root {
            --cor-primaria: #22C55E;
            --cor-segunda: #16A34A;
            --cor-alerta: #EAB308;
            --cor-perigo: #EF4444;
            --cor-info: #3B82F6;
            --cor-fundo: #0F172A;
            --cor-fundo-card: #1E293B;
            --cor-card-claro: #334155;
            --cor-texto: #F8FAFC;
            --cor-texto-secundario: #CBD5E1;
            --cor-borda: #475569;
            --sombra-suave: 0 8px 32px rgba(0,0,0,0.3);
            --sombra-forte: 0 12px 40px rgba(0,0,0,0.4);
            --borda-radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: var(--cor-texto);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--cor-fundo-card);
            border-radius: var(--borda-radius);
            box-shadow: var(--sombra-forte);
            padding: 24px;
            border: 1px solid var(--cor-borda);
            backdrop-filter: blur(10px);
        }

        /* 🚀 LOGO */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--cor-borda);
        }

        .logo-container img {
            height: 45px;
            width: auto;
            object-fit: contain;
        }

        .logo-texto {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--cor-primaria), var(--cor-info));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h2, h3, h4 {
            text-align: center;
            margin-bottom: 16px;
            font-weight: 700;
        }

        h2 { font-size: 22px; }
        h3 { font-size: 18px; }

        /* 📝 FORMULÁRIOS */
        .form-group {
            position: relative;
            margin-bottom: 14px;
        }

        .form-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--cor-texto-secundario);
            font-size: 18px;
            z-index: 2;
        }

        input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background-color: var(--cor-card-claro);
            border: 1px solid var(--cor-borda);
            border-radius: 12px;
            font-size: 15px;
            color: var(--cor-texto);
            transition: all 0.3s ease;
            outline: none;
        }

        input::placeholder { color: var(--cor-texto-secundario); opacity: 0.8; }
        input:focus {
            border-color: var(--cor-primaria);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
            background-color: var(--cor-fundo-card);
        }

        /* 🟢🔴 BOTÕES */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-success { 
            background: linear-gradient(135deg, var(--cor-primaria), var(--cor-segunda)); 
            color: white; 
        }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(34, 197, 94, 0.3); }
        .btn-success:active { transform: translateY(0px); }

        .btn-danger { 
            background: linear-gradient(135deg, var(--cor-perigo), #DC2626); 
            color: white; 
        }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(239, 68, 68, 0.3); }

        .btn-secondary { 
            background: var(--cor-card-claro); 
            color: var(--cor-texto); 
            border: 1px solid var(--cor-borda);
        }
        .btn-secondary:hover { background: var(--cor-borda); }

        .btn-blocked { 
            background: var(--cor-card-claro) !important; 
            color: var(--cor-texto-secundario) !important; 
            cursor: not-allowed !important;
            transform: none !important;
            box-shadow: none !important;
        }

        /* 🔍 SUGESTÕES AUTOCOMPLETE */
        .suggestions {
            border: 1px solid var(--cor-borda);
            border-top: none;
            background: var(--cor-card-claro);
            position: absolute;
            width: 100%;
            z-index: 9999;
            max-height: 220px;
            overflow-y: auto;
            border-radius: 0 0 12px 12px;
            display: none;
            box-shadow: var(--sombra-suave);
            margin-top: -2px;
        }

        .suggestion-item {
            padding: 12px 14px;
            cursor: pointer;
            font-size: 14px;
            color: var(--cor-texto);
            border-bottom: 1px solid var(--cor-borda);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: var(--cor-fundo-card); color: var(--cor-primaria); }

        /* 📊 STATUS E ANIMAÇÕES */
        .status-container {
            text-align: center;
            padding: 16px;
        }

        .status-icon {
            font-size: 55px;
            margin-bottom: 12px;
        }

        .status-buscando {
            color: var(--cor-alerta);
            animation: pulse 1.5s infinite ease-in-out;
        }
        .status-aceito {
            color: var(--cor-primaria);
            animation: float 2s infinite alternate ease-in-out;
        }
        .status-chegou {
            color: var(--cor-info);
            animation: pulse 1s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-6px); }
        }

        .status-texto { 
            font-size: 20px; 
            font-weight: bold; 
            margin-bottom: 5px; 
        }
        .status-subtexto { 
            color: var(--cor-texto-secundario); 
            font-size: 14px; 
            line-height: 1.5;
        }

        /* 💳 CARDS */
        .card {
            background: var(--cor-card-claro);
            border-radius: 12px;
            padding: 16px;
            margin-top: 14px;
            border: 1px solid var(--cor-borda);
            transition: all 0.3s ease;
        }

        .card-titulo {
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .linha-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 14px;
        }

        .valor-destaque {
            font-size: 20px;
            font-weight: 800;
            color: var(--cor-primaria);
        }

        .placa-badge {
            background: linear-gradient(135deg, var(--cor-info), #1D4ED8);
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            font-family: monospace;
            font-size: 15px;
        }

        /* 🗺️ MAPA - AGORA LINDO E GRANDE 🚗📍✅ */
        #cardMapa {
            margin-top: 14px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--cor-primaria);
            box-shadow: var(--sombra-suave);
            transition: all 0.4s ease;
        }

        #mapa {
            width: 100%;
            height: 320px;
            border-radius: 10px;
        }

        /* ⭐ AVALIAÇÕES */
        .avaliacoes-container {
            margin-top: 18px;
            border-top: 1px solid var(--cor-borda);
            padding-top: 14px;
        }

        .media-nota {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
            background: var(--cor-card-claro);
            padding: 10px;
            border-radius: 10px;
        }

        .nota-num { 
            font-size: 30px; 
            font-weight: bold; 
            color: var(--cor-alerta); 
        }
        .estrelas { color: var(--cor-alerta); font-size: 18px; }
        
        .avaliacao-item {
            background: var(--cor-card-claro);
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid var(--cor-alerta);
        }

        .item-topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }

        /* 📱 SCROLL PERSONALIZADO */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--cor-fundo); }
        ::-webkit-scrollbar-thumb { background: var(--cor-borda); border-radius: 3px; }

        /* ⭐ ESTILOS MODAL AVALIAÇÃO */
        .modal {
            z-index: 9999 !important;
        }
        .modal-conteudo {
            animation: aparecer 0.3s ease;
        }
        @keyframes aparecer { 
            from { opacity:0; transform: translateY(-20px); } 
            to { opacity:1; transform: translateY(0); } 
        }
        .estrela { 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 40px;
            color: #aaa;
        }
        .estrela.ativa { 
            color: #EAB308; 
            transform: scale(1.1); 
        }
        .btn-cinza {
            background: var(--cor-card-claro);
            color: var(--cor-texto);
            border: 1px solid var(--cor-borda);
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-verde {
            background: linear-gradient(135deg, var(--cor-primaria), var(--cor-segunda));
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 🚀 LOGO -->
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/ODespertardoAmor/RotaBrasil/refs/heads/main/assets/logo.jpg" alt="Rota Brasil">
            <span class="logo-texto">ROTA BRASIL</span>
        </div>

        <!-- ==========================================
            🔐 TELA DE LOGIN / CADASTRO
        =========================================== -->
        <div id="loginCard">
            <h2>🚗 Seja bem-vindo Passageiro!</h2>
            <p style="text-align:center; color:var(--cor-texto-secundario); margin-bottom:20px;">O melhor app de viagens do Brasil 🇧🇷</p>
            
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" id="nome" placeholder="Nome Completo (Apenas p/ Cadastro)">
            </div>
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Seu E-mail">
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="senha" placeholder="Sua Senha">
            </div>
            <div class="form-group">
                <i class="fas fa-phone"></i>
                <input type="text" id="telefone" placeholder="Telefone (Apenas p/ Cadastro)">
            </div>
            
            <button class="btn-success" onclick="login()">
                <i class="fas fa-key"></i> 🔑 Entrar
            </button>
            <button class="btn-secondary" onclick="registerPassageiro()">
                <i class="fas fa-user-plus"></i> 📝 Cadastrar Nova Conta
            </button>
            <div id="loginStatus" style="text-align:center; margin-top:12px; font-weight:bold; min-height:20px;"></div>
        </div>

        <!-- ==========================================
            🏠 DASHBOARD PRINCIPAL
        =========================================== -->
        <div id="dashboard" style="display: none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0; font-size:19px;">Para onde vamos?</h3>
                <button class="btn-danger" onclick="logoutPassageiro()" style="width:auto; padding:6px 12px; margin:0; font-size:12px; border-radius:8px;">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>

            <!-- 📍 ENDEREÇOS -->
            <div class="form-group">
                <i class="fas fa-location-dot" style="color:var(--cor-perigo);"></i>
                <input type="text" id="origem" placeholder="Local de Origem (GPS Automático)" oninput="buscarEndereco(this.value, 'origem')">
                <div id="sugestoes_origem" class="suggestions"></div>
            </div>

            <div class="form-group">
                <i class="fas fa-flag-checkered" style="color:var(--cor-primaria);"></i>
                <input type="text" id="destino" placeholder="Digite o endereço de destino..." oninput="buscarEndereco(this.value, 'destino')">
                <div id="sugestoes_destino" class="suggestions"></div>
            </div>

            <!-- 📡 BOTÃO GPS -->
            <button id="btnLocalizacao" class="btn-secondary" onclick="gerenciarBotaoLocalizacao()">
                <i class="fas fa-location-arrow"></i>
                <span id="txtBtnLocalizacao">📍 Capturar Minha Localização Atual</span>
            </button>

            <!-- 💰 CARD DE PREÇO -->
            <div id="cardValor" class="card" style="display: none; border-left:4px solid var(--cor-primaria);">
                <div class="linha-info">
                    <span>📏 Distância estimada:</span> <strong id="txtDistancia">0.0 km</strong>
                </div>
                <div class="linha-info">
                    <span>⏱️ Tempo estimado:</span> <strong id="txtTempo">0 min</strong>
                </div>
                <div class="linha-info" style="font-size:18px; margin-top:8px; padding-top:8px; border-top:1px dashed var(--cor-borda);">
                    <span>💸 Preço da Corrida:</span> <strong id="txtValor" class="valor-destaque">R$ 0,00</strong>
                </div>
                <button id="btnChamar" class="btn-success" style="margin-top:15px;" onclick="gerenciarBotaoLocalizacao()">
                    <i class="fas fa-rocket"></i> 🚀 CHAMAR ROTA BRASIL
                </button>
            </div>

            <!-- 🚦 STATUS DA CORRIDA -->
            <div id="cardStatus" class="card" style="display: none;">
                <div id="conteudoStatus"></div>
            </div>

            <!-- 🗺️ MAPA -->
            <div id="cardMapa" style="display: none;">
                <div id="mapa"></div>
            </div>

            <!-- ⭐ AVALIAÇÕES -->
            <div class="avaliacoes-container">
                <h4 style="text-align:left; margin-bottom:10px; display:flex; align-items:center; gap:6px;"><i class="fas fa-star" style="color:var(--cor-alerta)"></i> Minhas Avaliações</h4>
                <div id="mediaNota" class="media-nota">
                    <span class="nota-num">--</span>
                    <span class="estrelas"></span>
                </div>
                <div id="listaAvaliacoes"></div>
            </div>
        </div>
    </div>

<!-- ⭐ MODAL DE AVALIAÇÃO DO MOTORISTA -->
<div id="modalAvaliacaoPassageiro" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999;">
    <div class="modal-conteudo" style="background: #1E293B; margin: 10% auto; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; border: 2px solid #22C55E;">
        
        <h3 id="tituloAvaliacao" style="color: #F8FAFC; margin-bottom: 15px;"></h3>
        
        <div class="estrelas" style="font-size: 40px; color: #aaa; margin: 15px 0;">
            <span class="estrela" onclick="selecionarEstrela(1)">★</span>
            <span class="estrela" onclick="selecionarEstrela(2)">★</span>
            <span class="estrela" onclick="selecionarEstrela(3)">★</span>
            <span class="estrela" onclick="selecionarEstrela(4)">★</span>
            <span class="estrela" onclick="selecionarEstrela(5)">★</span>
        </div>

        <textarea id="comentarioAvaliacao" placeholder="Deixe um comentário (opcional)" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #475569; background: #334155; color: white; margin: 10px 0; min-height: 80px;"></textarea>

        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button onclick="fecharAvaliacao()" class="btn-cinza" style="flex:1;">Pular</button>
            <button onclick="enviarAvaliacaoMotorista()" class="btn-verde" style="flex:1;">Enviar Avaliação</button>
        </div>

    </div>
</div>

    <!-- ==========================================
        ⚙️ LÓGICA JAVASCRIPT CORRIGIDA E LIMPA
    =========================================== -->
    <script>
        const API = "https://rotabrasil-v1cf.onrender.com";
        const socket = io(API, {
            transports: ['websocket', 'polling'],
            upgrade: true,
            reconnection: true,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000,
            reconnectionAttempts: Infinity,
            timeout: 20000
        });

        let token = null;
        let passageiro = null;
        let corridaAtual = null;
        let mapa = null;
        let markerPassageiro = null;
        let markerMotorista = null;
        let rotaLinha = null;
        let autocompleteService = new google.maps.places.AutocompleteService();
        let distancia = 0;
        let valorFinal = 0;
        let estadoLocalizacao = 0; 
        let atualizacaoRota = null;
        let notaAvaliacao = 0;

        // 🔌 CONEXÃO
        socket.on("connect", () => {
            console.log("✅ Passageiro Conectado ao Sistema! 🇧🇷");
        });

        // ========================================================
        // 🚨 MOTORISTA ACEITOU
        // ========================================================
        socket.on("corrida_aceita", (dadosCorrida) => {
            console.log("🚗 Motorista aceitou a corrida! 🩷", dadosCorrida);
            
            corridaAtual = { ...corridaAtual, ...dadosCorrida }; 
            
            socket.emit("entrar_na_sala", { corrida_id: corridaAtual.id || corridaAtual.corrida_id });
            
            tocarSom('sucesso');
            falar(`Motorista ${dadosCorrida.motorista_nome || 'parceiro'} aceitou sua corrida e está a caminho! 🚗💨`);
            
            mostrarStatusCorridaAceita(dadosCorrida);
            inicializarMapaRastreamento();
        });

        // ========================================================
        // 📍 RECEBE LOCALIZAÇÃO DO MOTORISTA (NOME CORRIGIDO!)
        // ========================================================
        socket.on("localizacao_motorista", (dados) => {
            if(!corridaAtual || dados.corrida_id !== (corridaAtual.id || corridaAtual.corrida_id)) return;
            console.log("📍 Atualizando posição motorista:", dados);

            if(markerMotorista && mapa) {
                const posMotorista = new google.maps.LatLng(dados.lat, dados.lng);
                markerMotorista.setPosition(posMotorista);

                if(markerPassageiro) {
                    tracarRota(markerPassageiro.getPosition(), posMotorista);
                }

                const distanciaKm = calcularDistancia(
                    markerPassageiro.getPosition().lat(), markerPassageiro.getPosition().lng(),
                    dados.lat, dados.lng
                ).toFixed(1);

                const tempoMin = Math.round(distanciaKm * 2.5);

                const statusEl = document.getElementById('conteudoStatus');
                if(statusEl) {
                    const distanciaEl = statusEl.querySelector('.distancia-atual');
                    const tempoEl = statusEl.querySelector('.tempo-atual');
                    if(distanciaEl) distanciaEl.textContent = `${distanciaKm} km de você`;
                    if(tempoEl) tempoEl.textContent = `Chega em ${tempoMin} min 🕒`;

                    if(parseFloat(distanciaKm) < 0.5) {
                        statusEl.querySelector('.status-texto').innerHTML = `<i class="fas fa-check-circle status-chegou"></i> MOTORISTA CHEGOU! 🛑✅`;
                        falar("Seu motorista chegou! Embarque por favor.");
                        tocarSom('alerta');
                    }
                }
            }
        });

        // ========================================================
        // ❌ MOTORISTA CANCELA
        // ========================================================
        socket.on("corrida_cancelada", (dados) => {
            if(!corridaAtual || dados.corrida_id !== corridaAtual.id) return;
            tocarSom('alerta');
            falar("A corrida foi cancelada pelo motorista. Vamos buscar outro para você 🚗💨");
            alert("❌ Motorista cancelou a corrida 😔\nBuscando outro...");
            resetarInterfaceAposCancelamento();
        });

        // ========================================================
        // 🏁 CORRIDA FINALIZADA
        // ========================================================
        socket.on("corrida_finalizada", (dados) => {
            if(!corridaAtual || dados.corrida_id !== corridaAtual.id) return;
            tocarSom('sucesso');
            falar("Chegamos ao destino! Obrigado por viajar com a Rota Brasil 🇧🇷🤍");
            alert(`🏁 VIAGEM FINALIZADA ✅\nValor Total: R$ ${dados.valor.toFixed(2)}\nObrigado pela preferência!`);
            
            abrirAvaliacao(dados.motorista_id, dados.motorista_nome);
            resetarInterfaceAposCancelamento();
        });

        function falar(texto) {
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = "pt-BR"; msg.rate = 1.15; msg.volume = 1;
            speechSynthesis.speak(msg);
        }

        function tocarSom(tipo='normal') {
            let url = 'https://assets.mixkit.co/sfx/preview/mixkit-software-interface-notification-2576.mp3?v=2';
            if(tipo === 'sucesso') url = 'https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3?v=2';
            if(tipo === 'alerta') url = 'https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-clock-beep-989.mp3?v=2';
            new Audio(url).play().catch(e=>{});
        }

        function gerenciarBotaoLocalizacao() {
            if (estadoLocalizacao === 0) {
                usarLocalizacaoAtual();
            } else if (estadoLocalizacao === 1) {
                const destino = document.getElementById('destino').value;
                if(!destino || destino.length < 5) {
                    alert("⚠️ Por favor, digite um Destino antes de buscar o motorista!");
                    falar("Por favor, digite seu destino antes de continuar.");
                    return;
                }
                falar("Entrando e buscando motoristas!");
                chamarCorrida();
            }
        }

        function usarLocalizacaoAtual() {
            if(!navigator.geolocation) { alert("GPS não suportado"); return; }
            falar("📍 Buscando sua localização...");
            
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                document.getElementById('origem').value = `${lat},${lng}`;
                falar("Localização definida!");
                
                estadoLocalizacao = 1;
                document.getElementById('btnLocalizacao').className = "btn-success";
                document.getElementById('txtBtnLocalizacao').innerHTML = `<i class="fas fa-check"></i> 🚗 Entrar Buscando Motorista`;
                
                calcularValor();
            }, err => {
                alert("⚠️ Ative a permissão de Localização/GPS!");
            }, {enableHighAccuracy: true, maximumAge: 10000});
        }

        async function carregarAvaliacoes() {
            if (!passageiro) return;
            try {
                const res = await fetch(`${API}/avaliacoes?usuario_id=${passageiro.id}`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if(!res.ok) return;
                const dados = await res.json();
                
                const divMedia = document.getElementById("mediaNota");
                const divLista = document.getElementById("listaAvaliacoes");
                
                if (dados.avaliacoes && dados.avaliacoes.length > 0) {
                    let soma = 0;
                    divLista.innerHTML = "";
                    
                    dados.avaliacoes.forEach(av => {
                        soma += av.nota;
                        divLista.innerHTML += `
                            <div class="avaliacao-item">
                                <div class="item-topo">
                                    <span>👤 ${av.nome_avaliador || 'Anônimo'}</span>
                                    <span>${'⭐'.repeat(av.nota)}</span>
                                </div>
                                <div style="font-size:14px; color:var(--cor-texto-secundario); margin-top:4px;">${av.comentario || 'Sem comentários.'}</div>
                            </div>
                        `;
                    });
                    
                    let media = (soma / dados.avaliacoes.length).toFixed(1);
                    divMedia.querySelector(".nota-num").innerText = media;
                    
                    let estrelasHtml = "";
                    for(let i=1; i<=5; i++) {
                        estrelasHtml += i <= Math.round(media) ? `<i class="fas fa-star"></i>` : `<i class="far fa-star"></i>`;
                    }
                    divMedia.querySelector(".estrelas").innerHTML = estrelasHtml;
                } else {
                    divMedia.querySelector(".nota-num").innerText = "5.0";
                    divMedia.querySelector(".estrelas").innerHTML = `<i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>`;
                    divLista.innerHTML = `<p style="text-align:center; font-size:14px; color:var(--cor-texto-secundario); padding:10px;">Nenhuma avaliação recebida ainda 🤍</p>`;
                }
            } catch(e) { console.log("Erro ao carregar avaliações", e); }
        }

        function buscarEndereco(texto, tipo) {
            const divSug = document.getElementById(`sugestoes_${tipo}`);
            if(texto.length < 3) { divSug.style.display = 'none'; return; }

            autocompleteService.getPlacePredictions({ 
                input: texto, 
                language: 'pt-BR', 
                componentRestrictions: {country: 'br'},
                types: ['geocode', 'establishment']
            }, (res, status) => {
                if(status == 'OK' && res) {
                    divSug.innerHTML = '';
                    res.forEach(place => {
                        const item = document.createElement('div');
                        item.className = 'suggestion-item';
                        item.innerHTML = `<i class="fas fa-map-marker-alt"></i> ${place.description}`;
                        item.onclick = () => {
                            document.getElementById(tipo).value = place.description;
                            divSug.style.display = 'none';
                            calcularValor();
                        };
                        divSug.appendChild(item);
                    });
                    divSug.style.display = 'block';
                } else { divSug.style.display = 'none'; }
            });
        }

        function calcularValor() {
            const origen = document.getElementById('origem').value;
            const destino = document.getElementById('destino').value;

            if(!origen || !destino || origen.length < 5 || destino.length < 5) {
                document.getElementById('cardValor').style.display = 'none';
                return;
            }

            let randomDist = (Math.random() * 12 + 1).toFixed(1); 
            distancia = parseFloat(randomDist);
            let precoBase = 4.50;
            let precoKm = 1.10;
            valorFinal = precoBase + (distancia * precoKm);

            document.getElementById('txtDistancia').innerText = `${distancia} km`;
            document.getElementById('txtTempo').innerText = `${Math.round(distancia * 3.5)} min`;
            document.getElementById('txtValor').innerText = `R$ ${valorFinal.toFixed(2)}`;
            document.getElementById('cardValor').style.display = 'block';
            
            carregarAvaliacoes();
        }

        async function registerPassageiro() {
            try {
                document.getElementById("loginStatus").innerHTML = "⏳ Cadastrando...";
                const res = await fetch(`${API}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        nome: document.getElementById("nome").value,
                        email: document.getElementById("email").value,
                        senha: document.getElementById("senha").value,
                        telefone: document.getElementById("telefone").value,
                        tipo: "passageiro"
                    })
                });
                const data = await res.json();
                if(res.ok) {
                    document.getElementById("loginStatus").innerHTML = "✅ Conta criada! Entrando...";
                    login();
                } else {
                    alert("❌ " + (data.erro || "Erro ao cadastrar"));
                    document.getElementById("loginStatus").innerHTML = "";
                }
            } catch(e) { alert("Erro conexão"); }
        }

        async function login() {
            try {
                const res = await fetch(`${API}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: document.getElementById("email").value,
                        senha: document.getElementById("senha").value
                    })
                });
                const data = await res.json();
                if(res.ok && data.token) {
                    if(data.user.tipo !== "passageiro") {
                        alert("⚠️ Use conta de PASSAGEIRO!"); return;
                    }
                    token = data.token; passageiro = data.user;
                    localStorage.setItem("token_passageiro", token);
                    localStorage.setItem("user_passageiro", JSON.stringify(passageiro));
                    document.getElementById("loginCard").style.display = "none";
                    document.getElementById("dashboard").style.display = "block";
                    falar(`Olá ${passageiro.nome},pronto para viajar.bora de rota brasil!`);
                    carregarAvaliacoes();
                } else { alert("❌ " + (data.erro || "Dados inválidos")); }
            } catch(e) { alert("Erro conexão"); }
        }

        // 🔄 MANTER LOGADO
        const tS = localStorage.getItem("token_passageiro");
        const uS = localStorage.getItem("user_passageiro");
        if(tS && uS) {
            token = tS; passageiro = JSON.parse(uS);
            window.onload = () => {
                document.getElementById("loginCard").style.display = "none";
                document.getElementById("dashboard").style.display = "block";
                carregarAvaliacoes();
            };
        }

        function logoutPassageiro() {
            localStorage.removeItem("token_passageiro");
            localStorage.removeItem("user_passageiro");
            window.location.reload();
        }

        async function chamarCorrida() {
            const origen = document.getElementById('origem').value;
            const destino = document.getElementById('destino').value;

            if(!origen || !destino) { alert("⚠️ Preencha Origem e Destino!"); return; }

            const btn = document.getElementById('btnChamar');
            if(btn) {
                btn.disabled = true; 
                btn.classList.add('btn-blocked'); 
                btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ⏳ PROCURANDO MOTORISTAS...`;
            }

            tocarSom('alerta');
            falar("Procurando motoristas próximos, aguarde...");

            try {
                const res = await fetch(`${API}/nova_corrida`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        origem: origen,
                        destino: destino,
                        valor: valorFinal,
                        distancia: `${distancia.toFixed(1)} km`
                    })
                });

                const data = await res.json();
                if(!res.ok) throw data;

                corridaAtual = { id: data.corrida_id, origem: origen, destino, valor: valorFinal };
                mostrarStatusBuscando();

            } catch(err) {
                alert("❌ Erro: " + (err.erro || "Tente novamente"));
                if(btn) {
                    btn.disabled = false; 
                    btn.classList.remove('btn-blocked'); 
                    btn.innerHTML = `<i class="fas fa-rocket"></i> 🚀 CHAMAR ROTA BRASIL`;
                }
            }
        }

        function mostrarStatusBuscando() {
            document.getElementById('cardValor').style.display = 'none';
            document.getElementById('cardStatus').style.display = 'block';
            document.getElementById('cardMapa').style.display = 'none';

            document.getElementById('conteudoStatus').innerHTML = `
                <div class="status-container">
                    <i class="fas fa-car-side status-icon status-buscando"></i>
                    <div class="status-texto">Procurando Motoristas...</div>
                    <div class="status-subtexto">Aguarde, estamos encontrando o melhor motorista para você 🚗💨<br>Isso pode levar alguns segundos ⏳</div>
                    <br>
                    <button class="btn-danger" onclick="cancelarCorrida()">❌ Cancelar Viagem</button>
                </div>
            `;
        }

        function mostrarStatusCorridaAceita(dados) {
            document.getElementById('cardValor').style.display = 'none';
            document.getElementById('cardStatus').style.display = 'block';
            document.getElementById('cardMapa').style.display = 'block';

            document.getElementById('conteudoStatus').innerHTML = `
                <div class="status-container">
                    <div style="font-size: 26px; color: var(--cor-primaria); font-weight: bold; margin-bottom: 15px;">
                        <i class="fas fa-male status-icon status-aceito" style="font-size:35px !important;"></i> 
                        <div class="status-texto">Motorista a Caminho!</div>
                    </div>
                    
                    <div style="background: var(--cor-card-claro); border-radius: 12px; padding: 16px; margin-bottom: 15px; text-align: left; border:1px solid var(--cor-borda);">
                        <p class="linha-info"><strong><i class="fas fa-user-circle" style="color:var(--cor-info)"></i> Motorista:</strong> ${dados.motorista_nome || 'Confirmado ✅'}</p>
                        <p class="linha-info"><strong><i class="fas fa-car-side" style="color:var(--cor-perigo)"></i> Veículo:</strong> ${dados.carro || 'Carro Executivo'}</p>
                        <p class="linha-info"><strong><i class="fas fa-id-card"></i> Placa:</strong> <span class="placa-badge">${dados.placa || '---'}</span></p>
                        <p class="linha-info"><strong><i class="fas fa-star" style="color:var(--cor-alerta)"></i> Avaliação:</strong> ⭐ ${dados.nota_motorista || '5.0'}</p>
                        <p class="linha-info"><strong><i class="fas fa-ruler-horizontal"></i> Distância:</strong> <span class="distancia-atual">Calculando...</span></p>
                        <p class="linha-info"><strong><i class="fas fa-clock"></i> Tempo:</strong> <span class="tempo-atual">Aguardando GPS...</span></p>
                    </div>

                    <div class="status-subtexto">Por favor, aguarde no local de origem indicado 📍🤍<br>Evite atrasos, o motorista está vindo rápido 🚗💨</div>
                    <br>
                    <button class="btn-danger" onclick="cancelarCorrida()">❌ Cancelar Viagem</button>
                </div>
            `;
        }

        // ========================================================
        // 🗺️ MAPA CORRIGIDO
        // ========================================================
        function inicializarMapaRastreamento() {
            if (typeof google === 'undefined' || !google.maps) {
                console.error("API do Google Maps não carregou!");
                alert("⚠️ Mapa não carregou. Verifique sua chave API!");
                return;
            }

            if (!mapa) {
                const mapaDiv = document.getElementById('mapa');
                if (!mapaDiv) return;

                mapa = new google.maps.Map(mapaDiv, {
                    center: { lat: -23.5505, lng: -46.6333 },
                    zoom: 15,
                    mapTypeControl: false,
                    streetViewControl: false,
                    fullscreenControl: true,
                    styles: [
                        { featureType: "all", elementType: "labels", stylers: [{ visibility: "on" }] },
                        { featureType: "all", elementType: "geometry", stylers: [{ color: "#1E293B" }] },
                        { featureType: "road", elementType: "geometry", stylers: [{ color: "#334155" }] },
                        { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#CBD5E1" }] },
                        { featureType: "poi", elementType: "geometry", stylers: [{ color: "#475569" }] }
                    ]
                });
            }

            // 🧍 MARCADOR PASSAGEIRO
            if (!markerPassageiro) {
                markerPassageiro = new google.maps.Marker({
                    position: { lat: -23.5505, lng: -46.6333 },
                    map: mapa,
                    title: "Você 🧍",
                    icon: { url: "https://cdn-icons-png.flaticon.com/512/64/64572.png", scaledSize: new google.maps.Size(40, 40) },
                    animation: google.maps.Animation.DROP
                });

                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            const posUser = new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                            markerPassageiro.setPosition(posUser);
                            mapa.setCenter(posUser);
                        },
                        (erro) => {
                            console.warn("Erro ao pegar localização:", erro);
                        },
                        { enableHighAccuracy: true, timeout: 10000 }
                    );
                }
            }

            // 🚗 MARCADOR MOTORISTA
            if (!markerMotorista) {
                markerMotorista = new google.maps.Marker({
                    position: { lat: -23.5505, lng: -46.6333 },
                    map: mapa,
                    title: "Seu Motorista 🚗",
                    icon: { url: "https://cdn-icons-png.flaticon.com/512/2979/2979991.png", scaledSize: new google.maps.Size(45, 45) },
                    animation: google.maps.Animation.BOUNCE
                });
            }
        }

        function tracarRota(pontoA, pontoB) {
            const directionsService = new google.maps.DirectionsService();
            const directionsRenderer = new google.maps.DirectionsRenderer({
                suppressMarkers: true,
                polylineOptions: {
                    strokeColor: "#22C55E",
                    strokeWeight: 5,
                    strokeOpacity: 0.9
                }
            });
            directionsRenderer.setMap(mapa);

            directionsService.route({
                origin: pontoA,
                destination: pontoB,
                travelMode: google.maps.TravelMode.DRIVING
            }, (result, status) => {
                if (status === "OK") {
                    directionsRenderer.setDirections(result);
                }
            });

            const bounds = new google.maps.LatLngBounds();
            bounds.extend(pontoA);
            bounds.extend(pontoB);
            mapa.fitBounds(bounds);
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
            return R * c;
        }

        // ========================================================
        // ❌ CANCELAR CORRIDA (AGORA AVISA MOTORISTA)
        // ========================================================
        async function cancelarCorrida() {
    falar("Cancelando sua viagem, aguarde...");

    if(!corridaAtual || !corridaAtual.id) {
        resetarInterfaceAposCancelamento();
        return;
    }

    try {
        // ✅ ID agora vai na URL, como a rota espera
        const res = await fetch(`${API}/cancelar_corrida/${corridaAtual.id}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            // Se quiser manter o motivo, continua enviando no body
            body: JSON.stringify({ 
                motivo: "Cancelado pelo passageiro" 
            })
        });

        if(res.ok) {
            socket.emit("cancelar_corrida", { corrida_id: corridaAtual.id });
            tocarSom('alerta');
            alert("🚫 Viagem cancelada com sucesso! O motorista já foi avisado 🤍");
            falar("Viagem cancelada com sucesso.");
        } else {
            const erro = await res.json().catch(() => ({}));
            alert(`⚠️ Não foi possível cancelar: ${erro.erro || "tente novamente"}`);
        }
    } catch(e) {
        console.error("Erro ao cancelar corrida:", e);
        alert("❌ Erro de conexão ao cancelar. Verifique sua internet.");
    } finally {
        resetarInterfaceAposCancelamento();
    }
}

        // ========================================================
        // 🔄 RESETAR TELA APÓS CANCELAMENTO OU FINALIZAÇÃO
        // ========================================================
        function resetarInterfaceAposCancelamento() {
            corridaAtual = null;
            
            // Para qualquer atualização automática que estiver rodando
            if(atualizacaoRota) {
                clearInterval(atualizacaoRota);
                atualizacaoRota = null;
            }

            // Esconde os cards de status e mapa
            document.getElementById('cardStatus').style.display = 'none';
            document.getElementById('cardMapa').style.display = 'none';
            
            // Reseta variáveis do mapa para recriar na próxima corrida
            if(mapa) mapa = null;
            if(markerPassageiro) markerPassageiro = null;
            if(markerMotorista) markerMotorista = null;
            if(rotaLinha) rotaLinha = null;

            // Volta a mostrar o card de valor e recalcula preço se tiver endereços
            calcularValor();

            // Libera o botão de chamar corrida novamente
            const btn = document.getElementById('btnChamar');
            if(btn) {
                btn.disabled = false;
                btn.classList.remove('btn-blocked');
                btn.innerHTML = `<i class="fas fa-rocket"></i> 🚀 CHAMAR ROTA BRASIL`;
            }
        }

        // ========================================================
        // ⭐ FUNÇÕES DE AVALIAÇÃO DO MOTORISTA
        // ========================================================
        function abrirAvaliacao(motoristaId, nomeMotorista) {
            notaAvaliacao = 0; // Zera a nota
            // Limpa campos do modal
            document.getElementById('comentarioAvaliacao').value = "";
            document.getElementById('tituloAvaliacao').innerText = `Avalie ${nomeMotorista || 'Seu Motorista'}`;
            
            // Tira a cor de todas as estrelas
            const estrelas = document.querySelectorAll('.estrela');
            estrelas.forEach(e => e.classList.remove('ativa'));
            
            // Mostra o modal
            document.getElementById('modalAvaliacaoPassageiro').style.display = "block";
        }

        function selecionarEstrela(nota) {
            notaAvaliacao = nota;
            const estrelas = document.querySelectorAll('.estrela');
            
            // Acende até a estrela clicada
            estrelas.forEach((estrela, indice) => {
                estrela.classList.toggle('ativa', indice < nota);
            });
        }

        function fecharAvaliacao() {
            document.getElementById('modalAvaliacaoPassageiro').style.display = "none";
        }

        async function enviarAvaliacaoMotorista() {
            if(notaAvaliacao === 0) { 
                alert("⚠️ Por favor, dê uma nota de 1 a 5 estrelas antes de enviar!"); 
                return; 
            }

            try {
                const res = await fetch(`${API}/avaliar_motorista`, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json", 
                        "Authorization": `Bearer ${token}` 
                    },
                    body: JSON.stringify({
                        corrida_id: corridaAtual?.id,
                        motorista_id: corridaAtual?.motorista_id,
                        nota: notaAvaliacao,
                        comentario: document.getElementById('comentarioAvaliacao').value
                    })
                });

                if(res.ok) {
                    tocarSom('sucesso');
                    alert("✅ Avaliação enviada com sucesso! Obrigado por viajar com a gente 🇧🇷🤍");
                    // Atualiza a lista de avaliações na tela
                    carregarAvaliacoes();
                } else {
                    alert("❌ Erro ao enviar avaliação, tente novamente.");
                }
            } catch(e) {
                alert("❌ Erro de conexão ao enviar avaliação.");
            } finally {
                fecharAvaliacao();
            }
        }
